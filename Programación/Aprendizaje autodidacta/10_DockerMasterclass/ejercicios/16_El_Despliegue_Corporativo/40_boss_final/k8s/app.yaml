# ============================================================
#  BOSS FINAL (ej 40) - Despliegue en Kubernetes
#
#  El mismo artefacto (tu imagen masterclass/ej40) ahora en k8s:
#   - cache (redis) como Deployment + Service (ya resuelto),
#   - ConfigMap + Secret con la config y el secreto de la API,
#   - Deployment de la API (2 replicas) que consume config/secret y habla con
#     el Service  cache , con readiness probe en /health,
#   - Service de la API.
#  Completa los TODO.
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cache
  labels: { app: cache }
spec:
  replicas: 1
  selector:
    matchLabels: { app: cache }
  template:
    metadata:
      labels: { app: cache }
    spec:
      containers:
        - name: cache
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: cache
spec:
  selector: { app: cache }
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
data:
  # TODO 1: clave  MENSAJE  con valor  boss final superado
---
apiVersion: v1
kind: Secret
metadata:
  name: api-secret
type: Opaque
stringData:
  # TODO 2: clave  API_KEY  con valor  supersecreto
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels: { app: api }
spec:
  # TODO 3: 2 replicas
  selector:
    matchLabels: { app: api }
  template:
    metadata:
      labels: { app: api }
    spec:
      containers:
        - name: api
          # TODO 4: image  masterclass/ej40:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: REDIS_HOST
              value: "cache:6379"
            # TODO 5: MENSAJE desde configMapKeyRef (api-config / MENSAJE)
            # TODO 6: API_KEY desde secretKeyRef (api-secret / API_KEY)
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector: { app: api }
  ports:
    - port: 8080
      targetPort: 8080
