schemaVersion: 2.0.0

fileExistenceTests:
  - name: "Capa estable: BUILD.txt existe"
    path: "/site/BUILD.txt"
    shouldExist: true
  - name: "Capa volatil: index.html copiado"
    path: "/site/index.html"
    shouldExist: true

fileContentTests:
  - name: "BUILD.txt contiene el marcador de capa estable"
    path: "/site/BUILD.txt"
    expectedContents:
      - "capa estable"
  - name: "El HTML servido es el de la app"
    path: "/site/index.html"
    expectedContents:
      - "Masterclass Docker"
