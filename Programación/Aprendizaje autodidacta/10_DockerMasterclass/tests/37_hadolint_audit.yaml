schemaVersion: 2.0.0

fileExistenceTests:
  - name: "El script existe en la imagen"
    path: "/saludo.sh"
    shouldExist: true

commandTests:
  - name: "La imagen imprime el mensaje esperado"
    command: "sh"
    args: ["/saludo.sh"]
    expectedOutput:
      - "auditoria superada"

metadataTest:
  cmd: ["sh", "/saludo.sh"]
