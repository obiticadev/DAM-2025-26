schemaVersion: 2.0.0

fileExistenceTests:
  - name: "app.py existe dentro del WORKDIR"
    path: "/app/app.py"
    shouldExist: true

commandTests:
  - name: "El script corre y reporta el WORKDIR"
    command: "python"
    args: ["/app/app.py"]
    expectedOutput:
      - "Directorio de trabajo actual: /app"
      - "App ejecutada correctamente desde WORKDIR."

metadataTest:
  workdir: "/app"
  cmd: ["python", "app.py"]
