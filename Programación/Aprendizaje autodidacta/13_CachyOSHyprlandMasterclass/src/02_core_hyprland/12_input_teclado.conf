# -----------------------------------------------------------------------------
# TODO 01: ABRE EL BLOQUE input { }
#   Declara un bloque `input { ... }` al principio del archivo. TODO lo
#   relativo a teclado va DENTRO. Si abres dos bloques input en el
#   mismo archivo o en archivos distintos, Hyprland los fusiona, pero
#   por legibilidad: uno solo.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 02: kb_layout = es,us
#   Dos layouts: español como default, inglés US como secundario. El
#   intercambio entre layouts se hará con `kb_options` (TODO 04).
#
#       kb_layout = es,us
#
#   Por qué: aunque escribas casi todo en español, terminales y código
#            funcionan mejor en US (símbolos `[ ] { } / \ ` ~` accesibles
#            sin AltGr). Tener ambos disponibles es lo lógico.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 03: kb_variant — vacío para ambos
#   Si NO quieres variantes específicas (Dvorak, Colemak, …), declara:
#
#       kb_variant =
#
#   Sintaxis: misma cantidad de elementos que kb_layout, separados por
#   comas. Para "es" + "us" vacíos: `,` (una coma, ambos vacíos). En
#   este caso lo dejamos completamente vacío que tiene el mismo efecto.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 04: kb_options — atajos útiles
#   Configura tres opciones XKB:
#     1) `grp:alt_shift_toggle` → Alt+Shift cicla entre es y us.
#     2) `caps:escape`          → CapsLock se vuelve Escape (vim/nvim).
#     3) `compose:ralt`         → AltGr es la tecla "compose" para
#                                  combinaciones tipo `é = ´ + e`.
#
#       kb_options = grp:alt_shift_toggle,caps:escape,compose:ralt
#
#   Por qué: las tres son ergonómicas y no estorban. Si NO quieres
#            `caps:escape` (algunas apps de productividad lo usan),
#            quítalo de la lista.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 05: kb_model
#   Si tu teclado es un Epomaker RT100, un Keychron, o cualquier
#   mecánico de 104+ teclas, mantén el default `pc105`. Para portátiles
#   suele ser `pc104`. Para portátiles Apple, `apple_alu_ansi` o
#   `macbook79`. Tu QMK con UC_LNX no requiere modelo específico
#   porque las teclas se mapean por scancode.
#
#       kb_model = pc105
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 06: repeat_delay y repeat_rate
#   Tu velocidad de "auto-repetición" al mantener una tecla. Valores
#   recomendados para uso intenso (vim/code):
#
#       repeat_delay = 250         # ms antes de empezar a repetir (default 600)
#       repeat_rate  = 35          # repeticiones por segundo (default 25)
#
#   Por qué: 600ms de delay se siente lento al navegar con flechas.
#            250ms es ágil sin disparar accidentes. 35 reps/s no es
#            agresivo y se siente fluido.
#
#   Si te parece demasiado rápido, sube delay a 300 / baja rate a 30.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 07: resolve_binds_by_sym
#   En layouts non-US (como `es`), algunas teclas físicas reportan
#   símbolos distintos. Activar `resolve_binds_by_sym = true` hace que
#   `bind = , Y, ...` funcione siempre que produzca la "Y" — más
#   intuitivo.
#
#       resolve_binds_by_sym = true
#
#   Por qué: sin esto, si tienes layout `es` y haces `bind = , Y, ...`,
#            podría no dispararse porque XKB internamente lo nombra
#            distinto en algunas variantes.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 08: numlock_by_default
#   Si tienes teclado con numpad y quieres NumLock encendido al iniciar
#   sesión:
#
#       numlock_by_default = true
#
#   En portátiles sin numpad, déjalo en false.
# -----------------------------------------------------------------------------



