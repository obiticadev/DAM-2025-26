# TODO 01: CATCH-ALL (wildcard)
#   Declara una regla por defecto que se aplique a CUALQUIER monitor no
#   listado explícitamente, con resolución preferida, posición auto y
#   escala 1.0:
#
#       monitor = , preferred, auto, 1
#
#   Por qué: garantiza que si enchufas un monitor nuevo en caliente,
#            Hyprland lo coloca automáticamente sin tu intervención.
#   Verifica con: hyprctl monitors  (en una sesión real, tras hot-plug)
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 02: RESOLUCIÓN, POSICIÓN Y ESCALA EXPLÍCITAS
#   Declara un monitor ficticio `eDP-1` (típico portátil) en:
#       resolución 1920x1080 a 60 Hz
#       posición   0x0
#       escala     1.0
#
#       monitor = eDP-1, 1920x1080@60, 0x0, 1
#
#   Por qué: la forma más explícita y predecible. Si conoces tu hardware,
#            esta es la que usas.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 03: ESCALA FRACCIONAL VÁLIDA
#   Para una pantalla 4K que quieres usar al 125%: declara `DP-4` con
#   resolución 3840x2160@60 Hz y escala 1.25 (válida porque 3840/1.25
#   = 3072 entero, y 2160/1.25 = 1728 entero). Posición a la derecha
#   del eDP-1 anterior con `auto-right`:
#
#       monitor = DP-4, 3840x2160@60, auto-right, 1.25
#
#   Gotcha: si pones 1.3 en vez de 1.25, Hyprland te avisará con un
#           warning de "ancho no entero" y se redondeará.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 04: TRANSFORMACIÓN (rotación 90°)
#   Declara un monitor vertical `HDMI-A-2` rotado 90° en sentido horario,
#   a la izquierda del setup. Sintaxis con flag `transform`:
#
#       monitor = HDMI-A-2, 1920x1080@60, -1080x0, 1, transform, 1
#
#   La posición `-1080x0` lo coloca a la izquierda del origen 0x0 (en
#   el "canvas lógico" puedes tener coordenadas negativas).
#   Transform: 0=normal, 1=90°, 2=180°, 3=270°, 4-7=flipped.
# -----------------------------------------------------------------------------



