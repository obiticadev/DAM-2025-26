# TODO 05: MIRROR (espejado)
#   Declara `HDMI-A-3` que ESPEJEE a `eDP-1`. Útil para proyectores en
#   presentaciones — duplicas exactamente la pantalla del portátil:
#
#       monitor = HDMI-A-3, 1920x1080@60, auto, 1, mirror, eDP-1
#
#   Por qué: el dispatcher equivalente en vivo es
#            `hyprctl keyword monitor "HDMI-A-3, 1920x1080@60, auto, 1, mirror, eDP-1"`
#            — útil para un script "modo presentación".
