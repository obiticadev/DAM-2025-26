# =============================================================================
# Ejercicio 14 — Gestos de touchpad
# -----------------------------------------------------------------------------
# Objetivo: tener el bloque `gestures { }` configurado y listo para
# CUANDO uses un portátil. En tu desktop AHORA no se aplica, pero el
# bootcamp te enseña a tenerlo preparado: una vez enchufes un laptop
# con touchpad, esta config "simplemente funciona".
#
# Este archivo se convertirá en parte de `~/.config/hypr/conf.d/
# 35-gestures.conf` (un archivo nuevo entre `30-input.conf` y
# `40-general.conf`, así que añade también la línea `source =`
# correspondiente a tu `hyprland.conf`).
#
# Referencia teórica: teoria/02_Core_Hyprland.md  §4
# =============================================================================


# -----------------------------------------------------------------------------
# TODO 01: ABRE EL BLOQUE gestures { }
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 02: workspace_swipe
#   Habilita el gesto de swipe horizontal entre workspaces. Default
#   false porque puede interferir con ratones precision-touch en
#   desktop, pero en touchpad es vital.
#
#       workspace_swipe = true
#
#   Por qué: 3 dedos arrastrando = cambiar ws. Más natural que tocar
#            cualquier bind. El UX-killer de Hyprland en portátiles.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 03: workspace_swipe_fingers
#   Cuántos dedos para activar:
#       3 = típico (gnome, macOS)
#       4 = más espacio para 3-dedos = click derecho personalizado
#
#       workspace_swipe_fingers = 3
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 04: workspace_swipe_distance
#   Píxeles que tienes que arrastrar para completar el cambio de ws.
#   Demasiado bajo = swipes accidentales. Demasiado alto = doloroso.
#
#       workspace_swipe_distance = 300
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 05: workspace_swipe_invert
#   - true  → direccional natural Mac (arrastras a la izq, ws siguiente
#             entra desde la der). Lo que esperas si vienes de macOS.
#   - false → contrario (arrastras a la izq, vas al ws anterior).
#
#       workspace_swipe_invert = true
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 06: workspace_swipe_min_speed_to_force
#   Si arrastras rápido aunque no llegues a `workspace_swipe_distance`,
#   se completa el cambio. Default 30 (px/ms). Bajarlo lo hace más
#   "sensible":
#
#       workspace_swipe_min_speed_to_force = 30
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 07: workspace_swipe_cancel_ratio
#   Si te arrepientes a medio swipe, ¿hasta qué fracción puedes volver
#   sin que se complete? 0.5 = hasta la mitad. Conservador y predecible:
#
#       workspace_swipe_cancel_ratio = 0.5
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 08: workspace_swipe_create_new
#   ¿Permitir que un swipe más allá del último ws cree uno nuevo?
#
#       workspace_swipe_create_new = true
#
#   Con `workspace = N, monitor:X, persistent:true` que ya hiciste, esto
#   importa menos — pero úsalo true para "explorar".
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 09: workspace_swipe_direction_lock
#   Una vez decides que el swipe es horizontal, no permitir que se
#   "interprete" como vertical a mitad del gesto. Evita falsos
#   positivos.
#
#       workspace_swipe_direction_lock = true
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 10: workspace_swipe_use_r
#   Decide si el swipe usa `e+1/e-1` (mismo monitor, default false) o
#   `m+1/m-1` (entre TODOS los workspaces globales, true).
#
#   En tu setup con workspaces pegados a monitor (1-5 DP-1, 6-10 HDMI),
#   usar `m+1` (true) significa swipear más allá del 5 te lleva al 6
#   del OTRO monitor — útil si entiendes los swipes como "ciclo
#   global". Si prefieres swipes que se quedan en el monitor actual,
#   déjalo false.
#
#       workspace_swipe_use_r = false
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 11: workspace_swipe_forever
#   Permitir swipes "infinitos" sin parar a redibujar entre ws.
#   Costoso en GPU, espectacular visualmente. Conservador: false.
#
#       workspace_swipe_forever = false
# -----------------------------------------------------------------------------



