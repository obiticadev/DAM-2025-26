# =============================================================================
# Ejercicio 17 — Layout master (alternativa, conocer otro modo de tiling)
# -----------------------------------------------------------------------------
# Objetivo: conocer y declarar el bloque `master { }`. NO vas a cambiar
# tu layout activo (que sigue siendo dwindle del 15) — declaras `master
# { }` en paralelo. Hyprland es feliz teniendo ambos bloques: solo se
# aplica el que diga `general:layout`.
#
# El archivo final se ANEXA también al `40-general.conf` (debajo del
# bloque `dwindle { }`).
#
# Cuando termines, en runtime puedes cambiar de layout sin reiniciar:
#     hyprctl keyword general:layout master
#     hyprctl keyword general:layout dwindle
#
# Referencia teórica: teoria/02_Core_Hyprland.md  §7
# =============================================================================


