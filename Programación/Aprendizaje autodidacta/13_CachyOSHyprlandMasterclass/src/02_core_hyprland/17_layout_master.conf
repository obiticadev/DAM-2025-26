# -----------------------------------------------------------------------------
# TODO 03: orientation
#   `left`   = master a la izquierda (default)
#   `right`  = master a la derecha
#   `top`    = master arriba
#   `bottom` = master abajo
#   `center` = master en medio (slaves a ambos lados)
#
#       orientation = left
#
#   Para ultrawide, `center` es una opción interesante (master ancho en
#   el medio, slaves estrechas a los lados). Pero para empezar, `left`
#   es lo más estándar.
# -----------------------------------------------------------------------------



