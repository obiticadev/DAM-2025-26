# -----------------------------------------------------------------------------
# TODO 02: pseudotile
#   "Pseudo-tile": las ventanas se pueden poner en un modo donde no
#   ocupan toda su celda del árbol, sino que tienen tamaño fijo (típico
#   1280x720 centrado en su celda). Útil para vídeo flotando.
#
#       pseudotile = true
#
#   Por qué true: lo activas a nivel global y solo afecta cuando uses
#                 el bind `pseudo` (que cubre el Bloque III). Si lo dejas
#                 false, el bind no hace nada. true = preparado.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 03: preserve_split
#   Cuando cierras una ventana, ¿el split del nodo padre vuelve a
#   "fundirse" o se queda? `true` = se queda, predecible.
#
#       preserve_split = true
#
#   Por qué: si trabajas con árbol mental "este split es horizontal,
#   este es vertical", cerrarlo y recrearlo es una pesadilla. Con
#   true, el árbol respeta tu estructura.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 04: smart_split
#   En vez de auto-decidir si dividir horizontal o vertical según
#   aspect ratio, mira DÓNDE pulsas en la ventana padre al crear la
#   nueva.
#
#       smart_split = false
#
#   Por qué false: añade fricción cognitiva — tienes que pensar dónde
#                   pulsar. Para producir flujo, `false` con `force_split
#                   = 0` (auto por aspect ratio) es lo más rápido.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 05: smart_resizing
#   Resize "respeta el árbol": al hacer ancha una hija, su pareja
#   adelgaza, pero el padre no afecta a los tíos. Activa siempre:
#
#       smart_resizing = true
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 06: force_split
#   - 0 = auto (split horizontal o vertical según aspect ratio)
#   - 1 = siempre a la IZQUIERDA / ARRIBA de la ventana padre
#   - 2 = siempre a la DERECHA / ABAJO
#
#       force_split = 0
#
#   Por qué auto: en ultrawide, "ratio > 1" (ancho > alto), el auto
#   prefiere splits verticales (dos columnas) — lo ideal para tu monitor.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 07: special_scale_factor
#   Tamaño del scratchpad (`special:magic`) relativo al monitor.
#   `0.8` = ocupa el 80% (default). Algo así como un Quake-console:
#
#       special_scale_factor = 0.8
#
#   Si lo quieres tipo Tilda (más alto, no centrado), no se controla
#   aquí — special workspace siempre se centra. Para un "drop-down" más
#   sofisticado: en el Bloque III usaremos `togglespecialworkspace`
#   con varios special workspaces (notas, música, terminal flotante).
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 08: split_width_multiplier
#   Sesga los splits a horizontal vs vertical:
#     1.0 = balanceado (default)
#     1.5 = sesga horizontal (más anchos)
#     0.7 = sesga vertical
#
#       split_width_multiplier = 1.0
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 09: use_active_for_splits
#   Si una nueva ventana divide la ENFOCADA (true) o la última del
#   workspace (false). True es lo lógico:
#
#       use_active_for_splits = true
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 10: default_split_ratio
#   Proporción del split al crear una ventana nueva. 1.0 = mitad y
#   mitad (default). 1.3 = la nueva ventana ocupa más; 0.7 = ocupa
#   menos. Para flujo "abro algo de paso y se va a la mitad", 1.0
#   funciona:
#
#       default_split_ratio = 1.0
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 11: no_gaps_when_only
#   Cuando solo hay UNA ventana en el workspace:
#     0 = mantén gaps y border (default)
#     1 = sin gaps_out (la ventana ocupa todo)
#     2 = sin gaps Y sin border (Pantalla completa "limpia")
#
#       no_gaps_when_only = 2
#
#   Por qué 2: visualmente despeja cuando solo hay un editor en
#   pantalla. Cuando abres una segunda ventana, los gaps vuelven solos.
# -----------------------------------------------------------------------------



