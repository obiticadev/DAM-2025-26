# -----------------------------------------------------------------------------
# TODO 03: gaps_in y gaps_out
#   Huecos. Sugerencias:
#
#       gaps_in  = 6              # entre ventanas
#       gaps_out = 12              # contra el borde del monitor
#
#   Por qué estos valores: en ultrawide, gaps grandes "respiran" la
#   imagen. En 1080p del HDMI, 12px afuera es razonable. Si te parece
#   excesivo, baja a 4 / 8 respectivamente.
#
#   Variante 4-vec: `gaps_out = 6 12 6 12` (top right bottom left). Por
#   ejemplo cuando tienes waybar arriba ocupando 30px, puedes poner
#   `gaps_out = 36 12 6 12` para que la primera fila de ventanas no
#   quede pegada a la barra. Lo verás en el Bloque V.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 04: gaps_workspaces
#   Hueco extra al SWIPEAR entre workspaces (efecto cinemático).
#   `0` por defecto (sin efecto), `50` da una transición visible:
#
#       gaps_workspaces = 50
#
#   No tiene ningún efecto si no usas swipe (touchpad) o no animas el
#   cambio de ws. Si dejas un cambio instantáneo, ponlo a 0.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 05: border_size
#   Grosor del borde en px. `2` es buen sweet spot — visible sin
#   gritar. Para "borderless minimalism" pon `0` y deja que el rounding
#   y el gap hagan el trabajo.
#
#       border_size = 2
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 06: no_border_on_floating
#   Si las ventanas flotantes NO deben tener borde. Mantén `false` para
#   que también las floating se distingan visualmente:
#
#       no_border_on_floating = false
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 07: col.active_border y col.inactive_border
#   USA las variables de la paleta. El borde activo será un gradiente
#   blue→mauve a 45° (típico Catppuccin). El inactivo, surface plano.
#
#       col.active_border   = rgba($blue) rgba($mauve) 45deg
#       col.inactive_border = rgba($surface)
#
#   Por qué gradiente: visualmente comunica "esta es la enfocada"
#   incluso de reojo.
#   Otras combos válidas:
#     rgba($peach) rgba($pink) 45deg   (warm)
#     rgba($green) rgba($teal) 90deg   (cool)
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 08: cursor_inactive_timeout
#   Segundos hasta esconder el cursor cuando no se mueve. `0` = nunca
#   esconder. `5` segundos es habitual.
#
#       cursor_inactive_timeout = 5
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 09: layout
#   `dwindle` (default, árbol binario) o `master` (uno grande + slaves).
#   Empieza con dwindle — es lo más versátil. Pasarás un rato con
#   master en el ejercicio 17 para conocerlo.
#
#       layout = dwindle
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 10: allow_tearing
#   Permite screen tearing (la pantalla actualiza zonas sin sync con
#   vblank). Gamers competitivos lo usan para -3ms input lag. Default
#   false, recomendado dejarlo:
#
#       allow_tearing = false
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 11: resize_on_border
#   Si el cursor sobre el borde permite redimensionar. Sumas QoL:
#
#       resize_on_border = true
#       extend_border_grab_area = 15      # área extra "agarrable"
#       hover_icon_on_border = true       # cambia icono al hover
# -----------------------------------------------------------------------------



