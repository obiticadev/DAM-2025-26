# TODO 01: VARIABLES DE COLOR (Catppuccin Macchiato)
#   Declara variables Hyprlang con la paleta. Las reutilizarás en
#   `decoration` (Bloque IV) y donde quieras. Lista en hex sin prefijo
#   (Hyprland necesita `rgba()` envolviéndolas, lo haces más abajo):
#
#       $base    = 24273aff      # fondo
#       $mantle  = 1e2030ff      # fondo más oscuro
#       $surface = 363a4fff      # paneles
#       $text    = cad3f5ff      # texto principal
#       $blue    = 8aadf4ff
#       $mauve   = c6a0f6ff
#       $pink    = f5bde6ff
#       $red     = ed8796ff
#       $peach   = f5a97fff
#       $yellow  = eed49fff
#       $green   = a6da95ff
#       $teal    = 8bd5caff
#
#   Por qué: si mañana cambias la paleta a Tokyo Night, editas estas 12
#            líneas y todo lo demás se actualiza solo.
# -----------------------------------------------------------------------------



