# =============================================================================
# Ejercicio 10 — Workspaces pegados a monitores (→ conf.d/80-workspaces.conf)
# -----------------------------------------------------------------------------
# Objetivo: en lugar de "10 workspaces que flotan entre monitores", pegar
# explícitamente 1-5 a DP-1 y 6-10 a HDMI-A-1. Tu cerebro deja de pensar
# "¿en qué monitor estoy?" y empieza a pensar "necesito ws 7 (música)".
#
# Cuando termines y los tests pasen, este archivo será tu
# `~/.config/hypr/conf.d/80-workspaces.conf`.
#
# Referencia teórica: teoria/02_Core_Hyprland.md  §2
# =============================================================================


# -----------------------------------------------------------------------------
# TODO 01: WORKSPACES 1-5 → DP-1 (ULTRAWIDE)
#   Declara cinco workspaces fijados al DP-1 con `monitor:DP-1`.
#   El #1 debe ser el `default:true` del DP-1, y los #1, #2, #3 deben ser
#   `persistent:true` (siempre existen, aunque estén vacíos — útil para
#   que SUPER+1/2/3 nunca falle por "workspace no existe").
#
#   Plantilla:
#       workspace = 1, monitor:DP-1, default:true, persistent:true
#       workspace = 2, monitor:DP-1, persistent:true
#       workspace = 3, monitor:DP-1, persistent:true
#       workspace = 4, monitor:DP-1
#       workspace = 5, monitor:DP-1
#
#   Por qué persistent solo 1-3: son tus ws "siempre abiertos" (terminal,
#   navegador, comms). 4-5 son "según necesidad" — se crean al saltar a
#   ellos.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 02: WORKSPACES 6-10 → HDMI-A-1 (PHILIPS 1080p)
#   Declara cinco workspaces fijados al HDMI-A-1. El #6 es el default y
#   persistent del HDMI-A-1; #7 (típicamente música) también persistent;
#   el resto solo `monitor:HDMI-A-1`.
#
#   Plantilla:
#       workspace = 6,  monitor:HDMI-A-1, default:true, persistent:true
#       workspace = 7,  monitor:HDMI-A-1, persistent:true
#       workspace = 8,  monitor:HDMI-A-1
#       workspace = 9,  monitor:HDMI-A-1
#       workspace = 10, monitor:HDMI-A-1
#
#   Verifica con: hyprctl workspaces (debes ver los persistent siempre,
#   incluso recién logueado).
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 03: WORKSPACE ESPECIAL (SCRATCHPAD)
#   Hyprland tiene un "special workspace" oculto que se toggle con un
#   bind. Es ideal para una nota rápida o un terminal flotante que no
#   ocupa workspace número.
#
#   Tu hyprland.conf actual ya tiene un bind:
#       bind = $mainMod, S, togglespecialworkspace, magic
#       bind = $mainMod SHIFT, S, movetoworkspace, special:magic
#
#   Aquí declara el ws especial con scale-factor personalizable y
#   monitor preferido (el DP-1 para que aparezca en tu pantalla
#   principal):
#
#       workspace = special:magic, on-created-empty:[silent] kitty
#
#   `on-created-empty` lanza un kitty con `[silent]` (sin robar foco)
#   la primera vez que invocas el scratchpad. A partir de ahí cuelga
#   ahí permanente.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 04: WORKSPACES CON NOMBRES (OPCIONAL)
#   Además de los numerados, declara dos workspaces con nombre — útiles
#   cuando quieres binds dedicados (los crearás en el Bloque III). Por
#   ahora SOLO las declaraciones:
#
#       workspace = name:music, monitor:HDMI-A-1, persistent:true, on-created-empty:[silent] spotify
#       workspace = name:notes, monitor:DP-1
#
#   No te lances a binds para ellos todavía — los conocerás en el
#   ejercicio 19. Aquí solo registras los workspaces.
#   Para entrar manualmente: `hyprctl dispatch workspace name:music`.
# -----------------------------------------------------------------------------



