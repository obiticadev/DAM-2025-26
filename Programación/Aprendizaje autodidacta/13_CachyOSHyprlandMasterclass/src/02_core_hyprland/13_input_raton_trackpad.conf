# -----------------------------------------------------------------------------
# TODO 02: sensitivity
#   Multiplicador de velocidad del cursor. Rango -1.0 (lento) a 1.0
#   (rápido). `0.0` significa "tal cual lo da el driver".
#
#       sensitivity = 0
#
#   Si el cursor se siente lento en tu ultrawide (mucho ancho que
#   recorrer), prueba 0.3 - 0.5. Mejor ajustar AQUÍ que cambiar DPI en
#   el ratón.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 03: accel_profile
#   - `flat` → sin aceleración. Mover el ratón 1 cm = siempre los mismos
#              píxeles. Gamers e ilustradores prefieren esto.
#   - `adaptive` → aceleración curva del sistema (default). Mover rápido
#                  cubre más distancia. Usuarios "normales".
#
#       accel_profile = flat
#
#   Si NO eres gamer/diseñador, considera `adaptive`.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 04: force_no_accel
#   Mata aceleración a nivel kernel aunque el driver insista en darla.
#   Solo si `accel_profile = flat` no es suficiente:
#
#       force_no_accel = false
#
#   Mantén false a menos que notes el problema.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 05: follow_mouse
#   Decide si el foco sigue al ratón o requiere click.
#     0 = solo click (estilo Windows)
#     1 = sigue al ratón (default)
#     2 = sigue pero el keypress se queda en la última con foco "duro"
#     3 = lo mismo que 2 pero más agresivo
#
#       follow_mouse = 1
#
#   Por qué: en ultrawide es ágil pasar al monitor secundario solo
#            moviendo el ratón. Si te molesta cuando lees y rozas el
#            otro monitor, prueba `2`.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 06: mouse_refocus
#   Cuando dos ventanas en distintos workspaces tienen foco "pendiente",
#   el ratón decide la activa al moverse:
#
#       mouse_refocus = true
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 07: float_switch_override_focus
#   Comportamiento cuando hay ventanas floating sobre tiles:
#     0 = no override (las floating no roban foco)
#     1 = override (default — más natural)
#     2 = solo si la floating está exactamente bajo el cursor
#
#       float_switch_override_focus = 1
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 08: scroll_method y natural_scroll
#   En ratón no se usa scroll_method (es solo touchpad), pero
#   natural_scroll sí afecta a la rueda:
#
#       natural_scroll = false
#
#   `false` = scroll natural de Windows/Linux (rueda hacia arriba =
#             contenido sube). `true` = Mac-style (rueda hacia arriba =
#             contenido baja, como si "arrastraras"). Tú decides.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 09: scroll_factor
#   Multiplicador del scroll en apertura ratón. Default 1.0; algunas
#   apps Wayland se sienten lentas — 1.2-1.5 ayuda. Más allá se vuelve
#   incómodo.
#
#       scroll_factor = 1.0
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 10: SUB-BLOQUE touchpad { ... } (PREPARADO PARA FUTURO PORTÁTIL)
#   No aplica AHORA en tu desktop, pero lo dejas configurado para el
#   día que conectes el portátil:
#
#       touchpad {
#           natural_scroll = true
#           scroll_factor = 0.5
#           disable_while_typing = true
#           tap-to-click = true
#           tap-and-drag = true
#           clickfinger_behavior = true
#           middle_button_emulation = false
#       }
#
#   Por qué dejarlo escrito ya: cuando enchufes el laptop el primer día
#   no tienes que recordar nada — funciona como en macOS.
# -----------------------------------------------------------------------------



