# archivo: cuando aplicques a tu sistema, copia 12 + 13 a UN solo
# `30-input.conf` con UN solo bloque `input { }`.
#
# Para que los tests aquí pasen sin necesidad de fusionar, declaramos un
# bloque `input { }` propio en este archivo.
#
# Referencia teórica: teoria/02_Core_Hyprland.md  §3.2-3.3
# =============================================================================


