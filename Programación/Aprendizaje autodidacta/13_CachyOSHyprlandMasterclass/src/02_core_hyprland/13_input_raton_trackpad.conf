# -----------------------------------------------------------------------------
# Objetivo: SEGUNDA MITAD del archivo `~/.config/hypr/conf.d/30-input.conf`.
# Aquí cubrimos ratón, follow_mouse, scroll y un sub-bloque `touchpad { }`
# (que NO se aplica a tu desktop pero lo dejamos preparado para portátil
# futuro).
#
# IMPORTANTE: el bloque `input { }` se abre en el ejercicio 12 y se
# cierra en el 12. Aquí abrimos OTRO bloque `input { }` con los settings
# de ratón. Hyprland los fusiona — funciona porque la directiva acepta
