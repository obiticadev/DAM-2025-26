# =============================================================================
# Ejercicio 09 — Tus monitores REALES (→ conf.d/20-monitors.conf)
# -----------------------------------------------------------------------------
# Objetivo: este archivo se convierte en tu `~/.config/hypr/conf.d/
# 20-monitors.conf` definitivo. Aquí declaras tu LG ultrawide DP-1 y tu
# Philips HDMI-A-1 con todas las opciones que un setup serio merece:
# refresh nativo, VRR, descripción robusta y catch-all defensivo.
#
# Referencia teórica: teoria/02_Core_Hyprland.md  §1
# =============================================================================


# -----------------------------------------------------------------------------
# TODO 01: CATCH-ALL DEFENSIVO
#   PRIMERA línea del archivo: catch-all para que cualquier monitor
#   futuro (un proyector, un USB-C display, otro HDMI prestado) se
#   coloque automáticamente:
#
#       monitor = , preferred, auto, 1
#
#   Esta línea va ARRIBA: los monitores nombrados después la
#   sobreescriben para los que sí especificas.
#   Por qué: pre-empt errores cuando enchufas algo nuevo y no estás
#            preparado para tocar config.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 02: DP-1 — LG ULTRAWIDE (IZQUIERDA, MONITOR PRINCIPAL)
#   Declara DP-1 con tus valores nativos:
#       resolución: 2560x1080
#       refresh:    144 Hz
#       posición:   0x0
#       escala:     1.0
#
#   Versión mínima (la que ya tienes):
#       monitor = DP-1, 2560x1080@144, 0x0, 1
#
#   AÑADE además dos flags útiles:
#     - `vrr, 2` → VRR (FreeSync) solo en fullscreen. Sweet spot:
#                  juegos a refresh variable, escritorio sin flicker.
#     - `bitdepth, 10` → 10-bit color SI tu LG lo soporta. Si no, déjalo
#                        en `bitdepth, 8` o quítalo. Para saberlo:
#                        hyprctl monitors -j | jq '.[].availableModes'
#                        (o consulta el datasheet del modelo).
#
#   Forma final (ejemplo):
#       monitor = DP-1, 2560x1080@144, 0x0, 1, vrr, 2, bitdepth, 8
#
#   Por qué bitdepth 8 por defecto: 10-bit con apps no preparadas a veces
#   da flickers. Si tu LG es uno de los gaming (UltraGear), prueba 10
#   y observa.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 03: HDMI-A-1 — PHILIPS 273V7 (DERECHA, SECUNDARIO)
#   Igual que tienes:
#       resolución: 1920x1080
#       refresh:    60 Hz
#       posición:   2560x0  (justo a la derecha del DP-1)
#       escala:     1.0
#
#   Versión mínima:
#       monitor = HDMI-A-1, 1920x1080@60, 2560x0, 1
#
#   No añadas vrr aquí (el 273V7 NO soporta FreeSync).
#
#   Alternativa con `auto-right`:
#       monitor = HDMI-A-1, 1920x1080@60, auto-right, 1
#
#   ELIGE UNA y sé consistente. La explícita `2560x0` es más fácil de
#   razonar; `auto-right` es más robusta si cambias la resolución del
#   DP-1 (no tienes que recalcular). Tú decides.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 04: ALIAS POR DESCRIPCIÓN (OPCIONAL, COMENTADO)
#   Hay un bug conocido en kernel/firmware donde tras un suspend,
#   `DP-1` puede renombrarse a `DP-3` (o equivalente). La solución es
#   usar `desc:` en vez del conector. Para ti AHORA NO es necesario,
#   pero deja preparado el patrón comentado:
#
#       # monitor = desc:LG Electronics LG ULTRAGEAR ..., 2560x1080@144, 0x0, 1
#       # monitor = desc:PHL 273V7 ..., 1920x1080@60, 2560x0, 1
#
#   Para conocer la descripción exacta:
#       hyprctl monitors -j | jq '.[] | {name, description}'
#
#   Cópiala TAL CUAL al `desc:` (es case-sensitive).
# -----------------------------------------------------------------------------



