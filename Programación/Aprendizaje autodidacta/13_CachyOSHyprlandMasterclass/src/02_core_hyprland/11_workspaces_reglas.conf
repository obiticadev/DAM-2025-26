# =============================================================================
# Ejercicio 11 — Reglas por workspace: gaps, decoración, auto-launch
# -----------------------------------------------------------------------------
# Objetivo: aprender el "nivel 2" de workspaces — propiedades por-ws que
# alteran su estética y comportamiento. Este archivo COMPLEMENTA al
# `80-workspaces.conf` que dejaste en el ejercicio 10; aquí REVISITAS las
# mismas declaraciones añadiendo flags adicionales.
#
# Cuando termines, REEMPLAZAS `80-workspaces.conf` por este. No es un
# archivo "nuevo" — es la versión 2.0 del anterior.
#
# Referencia teórica: teoria/02_Core_Hyprland.md  §2.3-2.4
# =============================================================================


# -----------------------------------------------------------------------------
# TODO 01: WORKSPACE 1 (DP-1) — "TERMINAL" SIN GAPS
#   El ws 1 lo usarás para terminales — quitar gaps maximiza el espacio.
#   Declara:
#       workspace = 1, monitor:DP-1, default:true, persistent:true, gapsin:0, gapsout:0
#
#   Por qué: gapsin/gapsout a 0 elimina huecos dentro y contra el borde
#            para este ws. Cuando saltas al ws 2 los gaps vuelven a sus
#            valores `general:gaps_*` globales.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 02: WORKSPACE 2 (DP-1) — "NAVEGADOR" CON ON-CREATED-EMPTY
#   El ws 2 abrirá Firefox la primera vez que entres si está vacío:
#       workspace = 2, monitor:DP-1, persistent:true, on-created-empty:[silent] firefox
#
#   `[silent]` es un "execution flag" que evita robar el foco al lanzar.
#   Otros flags: `[float]`, `[tile]`, `[fullscreen]`, `[workspace N]`.
#   Multi-flag: `[silent;tile]`.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 03: WORKSPACE 3 (DP-1) — "DEV/IDE"
#   Workspace para tu IDE (IntelliJ, VSCode). Sin auto-launch porque
#   abres distintos IDEs según proyecto — solo persistente:
#       workspace = 3, monitor:DP-1, persistent:true
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 04: WORKSPACE 4 (DP-1) — "MISC FLOTANTE"
#   Ws 4 para apps que abres flotando (calculadora, picker de colores,
#   etc.). Sin persistent (se crea si lo necesitas). Le quitamos los
#   gaps_out para ver bien las floating contra el borde:
#       workspace = 4, monitor:DP-1, gapsout:5
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 05: WORKSPACE 5 (DP-1) — "FULLSCREEN GAMES"
#   Para gaming. Sin border, sin rounding, sin shadow — máximo
#   rendimiento, cero decoración. También quita gaps:
#       workspace = 5, monitor:DP-1, gapsin:0, gapsout:0, border:false, rounding:false, shadow:false
# -----------------------------------------------------------------------------



