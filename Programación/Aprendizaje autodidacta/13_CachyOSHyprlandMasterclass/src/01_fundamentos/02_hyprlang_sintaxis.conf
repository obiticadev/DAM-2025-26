# TODO 05: WINDOWRULEV2
#   Añade DOS reglas v2 (la versión moderna, la v1 está obsoleta):
#     a) Que la calculadora de KDE (class:^(org.kde.kcalc)$) abra flotando
#        y centrada.
#     b) Que pavucontrol (class:^(.*pavucontrol.*)$) abra flotando con
#        tamaño 600x500.
#   Sintaxis general:  windowrulev2 = RULE, MATCHER
#   RULES posibles incluyen: float, tile, fullscreen, maximize, pin,
#     opacity X Y, size W H, move X Y, center, workspace N, monitor NAME,
#     stayfocused, noinitialfocus, noblur, noshadow, nodim, idleinhibit, …
#   MATCHERS posibles: class:REGEX, title:REGEX, initialClass:REGEX,
#     initialTitle:REGEX, tag:STRING, xwayland:0|1, floating:0|1,
#     pinned:0|1, fullscreen:0|1, workspace:NAME, focus:0|1.
#   Puedes combinar matchers con comas: class:^(foo)$,title:^(bar.*)$
# -----------------------------------------------------------------------------



