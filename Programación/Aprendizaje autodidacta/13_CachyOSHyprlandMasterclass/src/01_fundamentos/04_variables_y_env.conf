# -----------------------------------------------------------------------------
# TODO 02: ENV VARS DE INPUT METHOD (fcitx5)
#   Tu setup ya las tiene en hyprland.conf. Replícalas aquí EXACTAMENTE:
#
#       env = GTK_IM_MODULE,fcitx
#       env = QT_IM_MODULE,fcitx
#       env = XMODIFIERS,@im=fcitx
#       env = SDL_IM_MODULE,fcitx
#       env = GLFW_IM_MODULE,ibus
#
#   Por qué: lo explicaste tú mismo en tu README — fcitx5 implementa
#            input-method-v2 que es lo que kitty Wayland-nativo necesita.
#   Gotcha: GLFW_IM_MODULE va a `ibus` aposta, no es typo (compatibilidad
#           histórica de GLFW).
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 03: ENV VARS DE CURSOR
#   Hyprland usa hyprcursor en paralelo con XCursor. Define las cuatro
#   variables (deja `Adwaita` como tema si no tienes Bibata instalado —
#   en CachyOS Hyprland edition viene Adwaita por defecto):
#
#       env = XCURSOR_THEME,Adwaita
#       env = XCURSOR_SIZE,24
#       env = HYPRCURSOR_THEME,Adwaita
#       env = HYPRCURSOR_SIZE,24
#
#   Por qué: sin XCURSOR_*, apps XWayland (Steam, Discord legacy) muestran
#            el cursor "X11 root" por defecto (ese asco de cruz blanca).
#            Sin HYPRCURSOR_*, Hyprland nativo usa el built-in pequeño.
#   Para listar cursores instalados:
#       ls /usr/share/icons/  |  grep -iE 'cursor|bibata|adwaita|capitaine'
#   Para instalar Bibata más adelante:
#       sudo pacman -S bibata-cursor-theme
#       # y cambias estos 4 valores a Bibata-Modern-Classic
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 04: ENV VARS DE THEMING TOOLKIT (GTK/Qt)
#   Añade estas para que apps Qt respeten el tema y apps GTK no se vean
#   raras bajo Wayland:
#
#       env = QT_QPA_PLATFORMTHEME,qt5ct
#       env = QT_QPA_PLATFORM,wayland;xcb
#       env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
#       env = QT_AUTO_SCREEN_SCALE_FACTOR,1
#       env = GDK_BACKEND,wayland,x11,*
#       env = CLUTTER_BACKEND,wayland
#
#   Notas:
#     - QT_QPA_PLATFORM con "wayland;xcb" intenta Wayland y cae a XCB
#       (X11) si la app no soporta Wayland. Orden importa.
#     - QT_WAYLAND_DISABLE_WINDOWDECORATION=1 evita las barras feas que
#       Qt dibuja sobre Wayland.
#     - GDK_BACKEND "wayland,x11,*" misma idea para GTK.
#     - qt5ct/qt6ct los instalas después con `sudo pacman -S qt5ct qt6ct`
#       y los configuras en el Bloque VIII.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 05: ENV VARS DE APPS ESPECÍFICAS QUE SE PORTAN MAL EN WAYLAND
#   Añade:
#
#       env = MOZ_ENABLE_WAYLAND,1                     # Firefox nativo Wayland
#       env = ELECTRON_OZONE_PLATFORM_HINT,auto        # Discord/VSCode/Slack
#       env = _JAVA_AWT_WM_NONREPARENTING,1            # IntelliJ/jetbrains no
#                                                       # se queda en gris
#       env = NIXOS_OZONE_WL,1                         # también ayuda en
#                                                       # algunas builds Electron
#
#   Por qué: cada una resuelve un bug famoso. Sin MOZ_ENABLE_WAYLAND,
#            Firefox corre bajo XWayland y el scroll/HiDPI sufre. Sin
#            ELECTRON_OZONE_PLATFORM_HINT, Discord/VSCode tienen blurry
#            text en pantallas HiDPI. Sin _JAVA_AWT_*, IntelliJ se queda
#            con un cuadrado gris.
# -----------------------------------------------------------------------------



