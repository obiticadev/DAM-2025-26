# ----- SECCIÓN L: RESIZE CONTINUO (binde) ------------------------------------

# -----------------------------------------------------------------------------
# TODO 01: RESIZE con CTRL+SHIFT+flechas (binde — se repite si mantienes)
#   Por qué `binde` (con flag `e`): si dejas pulsado SHIFT+CTRL+→, la
#   ventana se va ensanchando continuamente. Con `bind` normal cada
#   pulsación = un solo step.
#
#       binde = $mod CTRL, left,  resizeactive, -20  0
#       binde = $mod CTRL, right, resizeactive,  20  0
#       binde = $mod CTRL, up,    resizeactive,   0 -20
#       binde = $mod CTRL, down,  resizeactive,   0  20
#
#   Steps de 20px. Si quieres más rápido, sube a 40. Más fino, baja a
#   10. Para resize muy fino, mejor usa el submap del ejercicio 20.
# -----------------------------------------------------------------------------



# ----- SECCIÓN M: SWAP DE VENTANAS -------------------------------------------

# -----------------------------------------------------------------------------
# TODO 02: SWAP — intercambiar dos ventanas vecinas
#   movewindow desplaza; swapwindow intercambia con su vecina (más útil
#   en tiling cuando quieres reordenar sin desestructurar el árbol).
#
#       bind = $mod ALT, left,  swapwindow, l
#       bind = $mod ALT, right, swapwindow, r
#       bind = $mod ALT, up,    swapwindow, u
#       bind = $mod ALT, down,  swapwindow, d
#
#   Diferencia con movewindow:
#     movewindow l → mueve la activa a la izquierda (el árbol se
#                    reorganiza)
#     swapwindow l → intercambia la activa con la que ya está a la
#                    izquierda (el árbol mantiene su forma)
# -----------------------------------------------------------------------------



# ----- SECCIÓN N: Z-ORDER Y PIN ----------------------------------------------

# -----------------------------------------------------------------------------
# TODO 03: TOGGLE PIN — floating que aparece en todos los workspaces
#   Útil para una calculadora flotante que quieres "siempre encima" sin
#   importar el ws actual:
#
#       bind = $mod, A, togglepin,                       # A de "Anchor"
#
#   Combina con togglefloating: SHIFT+V para hacer float, $mod+A para
#   pin. Calculator anclada.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 04: ALTERZORDER — subir/bajar la z-order de una floating
#       bind = $mod, U, alterzorder, top                 # U de "Up"
#       bind = $modShift, U, alterzorder, bottom
#
#   En floating, varias ventanas se solapan. `alterzorder, top` sube la
#   activa al frente. Útil cuando una notificación o popup queda
#   debajo.
# -----------------------------------------------------------------------------



# ----- SECCIÓN O: GROUPS (TABS) ----------------------------------------------

# -----------------------------------------------------------------------------
# TODO 05: TOGGLE GROUP — convertir ventana en grupo (tabbed)
#   Los grupos en Hyprland funcionan como pestañas: varias ventanas en
#   el mismo "slot" del tiling, solo una visible.
#
#       bind = $mod, G,      togglegroup,
#       bind = $mod, Tab,    changegroupactive, f        # avanza pestaña
#       # CONFLICTO: tu $mod+Tab ya está en "workspace previous"
#
#   Decisión: mueve `workspace previous` a otra tecla y deja Tab para
#   grupos (más coherente con browsers), O al revés (más coherente con
#   tu memoria muscular actual).
#
#   RECOMENDADO: mantén $mod+Tab como `workspace, previous` (tu actual),
#   y usa $modShift+Tab para changegroupactive:
#
#       bind = $mod,      G,   togglegroup,
#       bind = $modShift, Tab, changegroupactive, f
#       # backwards (al estilo Ctrl+Shift+Tab en navegadores):
#       bind = $mod CTRL, Tab, changegroupactive, b
#
#   AÑADE bind para sacar ventana de grupo:
#       bind = $mod SHIFT, G, moveoutofgroup,
# -----------------------------------------------------------------------------



