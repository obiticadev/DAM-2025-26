# -----------------------------------------------------------------------------
# TODO 09: FOCUSURGENTORLAST — saltar a ventana con notificación
#       bind = $mod, U, focusurgentorlast,
#       ⚠️  CONFLICTO con TODO 04 ($mod+U = alterzorder top).
#
#   Resolución: mantén alterzorder en $mod+U (más usado día a día) y
#   pon urgent en $mod CTRL+U:
#
#       bind = $mod CTRL, U, focusurgentorlast,
#
