# ----- SECCIÓN W: SCREENSHOTS ------------------------------------------------

# -----------------------------------------------------------------------------
# TODO 06: SCREENSHOT TOOLS
#   Stack recomendado: grim (capture) + slurp (selección) + swappy
#   (anotar) + wl-copy (al portapapeles). Si te faltan:
#       sudo pacman -S --needed grim slurp wl-clipboard
#       paru -S swappy
#
#   Binds:
#       # Pantalla completa al portapapeles
#       bind = , Print, exec, grim - | wl-copy
#       # Selección al portapapeles
#       bind = SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy
#       # Selección, abrir swappy para anotar, copiar:
#       bind = $mod, Print, exec, grim -g "$(slurp)" - | swappy -f -
#       # Pantalla completa a archivo en ~/Pictures/Screenshots con fecha
#       bind = $mod SHIFT, Print, exec, mkdir -p ~/Pictures/Screenshots && grim ~/Pictures/Screenshots/$(date +%Y%m%d-%H%M%S).png
#
#   Print = la tecla "Imprimir Pantalla". En tu Epomaker debería estar
#   en algún sitio; si no, mapea otra tecla con XF86 o un atajo
#   compuesto.
# -----------------------------------------------------------------------------



