# ----- SECCIÓN V: PLAYBACK (play/pause/next/prev) ----------------------------

# -----------------------------------------------------------------------------
# TODO 04: CONTROL DE REPRODUCCIÓN — playerctl
#   playerctl habla con el dbus de mpris y controla Spotify, mpv,
#   Firefox/YouTube, vlc, etc. Funciona con TODO lo que registre mpris.
#
#       bindl = , XF86AudioPlay,  exec, playerctl play-pause
#       bindl = , XF86AudioPause, exec, playerctl play-pause
#       bindl = , XF86AudioStop,  exec, playerctl stop
#       bindl = , XF86AudioNext,  exec, playerctl next
#       bindl = , XF86AudioPrev,  exec, playerctl previous
#
#   Por qué `bindl`: para que también funcione con la sesión bloqueada
#   (mover canción sin desbloquear).
#
#   Si tienes varios players a la vez (Spotify + Firefox YouTube),
#   playerctl elige el "primary"; para forzar uno:
#       playerctl --player=spotify play-pause
# -----------------------------------------------------------------------------



