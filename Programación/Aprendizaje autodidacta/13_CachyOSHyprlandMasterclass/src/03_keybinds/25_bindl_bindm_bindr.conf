# =============================================================================
# Ejercicio 25 — Multimedia y screenshots (→ append 90-binds.conf)
# -----------------------------------------------------------------------------
# Objetivo: añadir binds de multimedia (volumen, brillo, play/pause) y
# de captura de pantalla. Estos binds usan los FLAGS `l`, `e`, `m`, `r`
# que cubre la teoría:
#   - bindle  = repetible y funciona con sesión bloqueada (volumen)
#   - bindl   = funciona con sesión bloqueada, no repite (play/pause)
#   - bind    = estándar (screenshot)
#
# Anexa al `~/.config/hypr/conf.d/90-binds.conf`.
#
# Requisitos en tu máquina:
#   sudo pacman -S --needed wireplumber playerctl brightnessctl grim slurp swappy wl-clipboard
#   (wireplumber/wpctl ya viene con CachyOS; el resto cuando hagan falta)
#
# Referencia teórica: teoria/03_Keybinds_Window_Mgmt.md  §2
# =============================================================================


# ----- SECCIÓN T: VOLUMEN ----------------------------------------------------

# -----------------------------------------------------------------------------
# TODO 01: VOLUMEN — XF86 keys
#   Usas `bindle` (locked + repeat): suben/bajan continuamente si
#   mantienes y funcionan aunque hyprlock esté activo.
#
#       bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
#       bindle = , XF86AudioLowerVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%-
#       bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
#       bindl  = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_SOURCE@ toggle
#
#   Flags:
#     `-l 1.0` = limita el volumen máximo a 100% (sin sobrepasar; evita
#     reventar altavoces si pulsas mucho).
#
#   `wpctl` = wireplumber-ctl, el control de PipeWire (lo trae CachyOS
#   por defecto).
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 02: VOLUMEN — fallback con CTRL+UP/DOWN (si tu teclado no tiene
#          XF86)
#   Algunos teclados mecánicos (como Epomaker RT100 en algunas layers)
#   no tienen las XF86 keys directas. Fallback:
#
#       bindle = $mod CTRL, up,   exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
#       bindle = $mod CTRL, down, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%-
#       bindl  = $mod CTRL, M,    exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
#       # ⚠️  CTRL+M tu actual está libre (M solo lo usabas con SUPER puro,
#       #     y eso ahora es para scratchpad de música). Verifica que no
#       #     colisiona con nada que hayas añadido en otros ejercicios.
# -----------------------------------------------------------------------------



