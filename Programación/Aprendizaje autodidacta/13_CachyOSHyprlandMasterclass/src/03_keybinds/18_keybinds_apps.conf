# ----- SECCIÓN B: CICLO DE VIDA DE VENTANAS Y SESIÓN -------------------------

# -----------------------------------------------------------------------------
# TODO 02: CIERRE DE VENTANA, BLOQUEO, SALIDA
#   Reemplaza tu actual:
#       bind = $mainMod, W, killactive,
#       bind = $mainMod, M, exec, ... hyprshutdown ...
#       bind = $mainMod ALT, SPACE, exec, ~/.config/hypr/scripts/power-menu.fish
#
#   Por:
#       bind = $mod,      Q,      killactive,           # Q de "Quit"
#       bind = $mod,      L,      exec, $lock           # L de "Lock"  → hyprlock
#       bind = $modAlt,   SPACE,  exec, ~/.config/hypr/scripts/power-menu.fish
#       # $mod+M se libera (lo usaras para scratchpads en el ejercicio 24)
#       # En su lugar, salir de sesion va con un bind largo y deliberado:
#       bind = $modShift, E,      exit,                 # SHIFT+E = "Exit", explicito
#
#   Por qué Q en vez de W: "W" lo usaras en el ejercicio 19 para "swap
#   window". Q es universal para "Quit", coherente con casi todo Linux.
#   Por qué L: porque "$mod+L" es estándar Windows/Linux para lock.
#   Por qué liberar M: necesitas SUPER+M para scratchpad de música.
# -----------------------------------------------------------------------------



