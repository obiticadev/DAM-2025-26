# ----- SECCIÓN A: DIÁLOGOS FLOTANTES UNIVERSALES -----------------------------

# -----------------------------------------------------------------------------
# TODO 01: DIÁLOGOS DE "ABRIR ARCHIVO" Y "GUARDAR COMO"
#   Casi todas las apps GTK/Qt usan títulos predecibles para sus
#   diálogos modales. Forzarlos a floating y centrados es lujo:
#
#       windowrulev2 = float,  title:^(Open File)$
#       windowrulev2 = float,  title:^(Open Folder)$
#       windowrulev2 = float,  title:^(Save File)$
#       windowrulev2 = float,  title:^(Save As)$
#       windowrulev2 = float,  title:^(Library)$
#       windowrulev2 = float,  title:^(Choose Files)$
#       windowrulev2 = center, title:^(Open File)$
#       windowrulev2 = center, title:^(Save As)$
#
#   Variantes en español (Qt y GTK localizados):
#       windowrulev2 = float,  title:^(Abrir archivo)$
#       windowrulev2 = float,  title:^(Guardar como)$
#       windowrulev2 = float,  title:^(Imprimir)$
#       windowrulev2 = float,  title:^(Seleccionar archivos)$
#
#   Por qué centrar: en ultrawide, un diálogo de "Abrir archivo" pegado
#   al borde izquierdo es absurdo.
# -----------------------------------------------------------------------------



