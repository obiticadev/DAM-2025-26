# ----- SECCIÓN D: BEHAVIOR — IDLEINHIBIT, OPACITY ----------------------------

# -----------------------------------------------------------------------------
# TODO 11: IDLEINHIBIT fullscreen en navegadores
#   Cuando ves Netflix/YouTube fullscreen, NO se debe apagar la pantalla.
#   "idleinhibit fullscreen" hace que la regla aplique solo cuando esa
#   ventana está fullscreen.
#
#       windowrulev2 = idleinhibit fullscreen, class:^(firefox)$
#       windowrulev2 = idleinhibit fullscreen, class:^(brave-browser)$
#       windowrulev2 = idleinhibit fullscreen, class:^(Vivaldi-stable)$
#       windowrulev2 = idleinhibit fullscreen, class:^(mpv)$
#       windowrulev2 = idleinhibit fullscreen, class:^(io\.mpv)$
#       # Para juegos: inhibit SIEMPRE (no fullscreen-only)
#       windowrulev2 = idleinhibit always, class:^(steam_app_.*)$
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 12: OPACITY POR APP
#   Las apps "fondo" pueden tener transparencia para ver el wallpaper
#   bonito; las "activas" full opacity:
#
#       windowrulev2 = opacity 0.95 0.85, class:^(kitty)$
#       windowrulev2 = opacity 0.95 0.85, class:^(Alacritty)$
#       windowrulev2 = opacity 1.0 1.0,   class:^(firefox)$
#       windowrulev2 = opacity 1.0 1.0,   class:^(jetbrains-.*)$
#
#   Sintaxis: opacity ACTIVE INACTIVE [FULLSCREEN]. Aplica solo si en
#   `decoration { active_opacity }` no está forzado.
# -----------------------------------------------------------------------------



