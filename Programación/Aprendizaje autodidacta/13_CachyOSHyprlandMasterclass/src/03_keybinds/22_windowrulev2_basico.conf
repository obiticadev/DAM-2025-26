# ----- SECCIÓN C: APPS A WORKSPACES (auto-routing) ---------------------------

# -----------------------------------------------------------------------------
# TODO 06: FIREFOX / BRAVE / VIVALDI → ws 2 silent
#   Ya declaraste `on-created-empty:[silent] firefox` en el ws 2
#   (ejercicio 11). Esta regla COMPLEMENTA: cuando lances Firefox
#   manualmente desde wofi, va al ws 2 sin importar de dónde lo
#   abriste:
#
#       windowrulev2 = workspace 2 silent, class:^(firefox)$
#       windowrulev2 = workspace 2 silent, class:^(brave-browser)$
#       windowrulev2 = workspace 2 silent, class:^(Vivaldi-stable)$
#
#   El `silent` evita que cambie el foco al ws 2 cuando lo lances desde
#   otro ws — importante si abres Firefox desde el ws 3 (IDE) y no
#   quieres irte.
# -----------------------------------------------------------------------------



