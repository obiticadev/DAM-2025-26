# =============================================================================
# Ejercicio 21 — Submap "passthrough" (→ anexar a conf.d/95-submaps.conf)
# -----------------------------------------------------------------------------
# Objetivo: un submap donde TODOS los binds de Hyprland se desactivan,
# excepto UNO para salir. Sirve para:
#   - VMs (qemu/KVM) donde quieres que $mod+letras vayan al guest.
#   - Streaming/grabación donde quieres pulsar atajos sin Hyprland los
#     intercepte.
#   - Apps con muchos atajos modales (Blender, DaVinci Resolve).
#
# Este archivo SE ANEXA al `95-submaps.conf` que dejaste en el 20.
#
# Referencia teórica: teoria/03_Keybinds_Window_Mgmt.md  §4.3
# =============================================================================


# ----- ENTRADA AL SUBMAP -----------------------------------------------------

# -----------------------------------------------------------------------------
# TODO 01: BIND DE ENTRADA — desde modo normal
#   Va FUERA del bloque `submap = passthrough`. Lo lógico es un atajo
#   "raro" para no entrar por accidente:
#
#       bind = $mod CTRL ALT, P, submap, passthrough
#
#   Por qué $mod+CTRL+ALT+P: tres modificadores garantizan que NUNCA te
#   meterás al passthrough por accidente. Si una VM o app pide $mod+L,
#   $mod+M, etc., los pulsas SIN miedo dentro del submap.
# -----------------------------------------------------------------------------



# ----- DECLARACIÓN -----------------------------------------------------------

# -----------------------------------------------------------------------------
# TODO 02: ABRE submap = passthrough
#       submap = passthrough
# -----------------------------------------------------------------------------



# ----- BINDS DENTRO DEL SUBMAP — SOLO LA SALIDA ------------------------------

# -----------------------------------------------------------------------------
# TODO 03: ÚNICO bind activo: SALIDA
#   Dentro del submap, declara UN solo bind con un modificador único.
#   Para evitar colisión con cualquier atajo de VM/Blender:
#
#       bind = $mod CTRL ALT, P, submap, reset
#       # mismo atajo que entrada → toggle
#
#   Y como red de seguridad doble (por si la VM captura $mod+CTRL+ALT+P
#   antes que Hyprland — raro pero posible):
#
#       bind = , XF86PowerOff, submap, reset
#       # el botón de power del teclado/PC también te saca
#
#   El power button literalmente apaga si no lo asignas, así que
#   asignárselo a "salir del submap" es bonus (mantiene seguro tu PC
#   y te da una vía de escape).
#
#   AVISO: NO declares Escape como exit aquí. Si la VM usa Escape (como
#   muchas), te sacaría involuntariamente.
# -----------------------------------------------------------------------------



# ----- CIERRE DEL SUBMAP -----------------------------------------------------

# -----------------------------------------------------------------------------
# TODO 04: CIERRA submap
#       submap = reset
# -----------------------------------------------------------------------------



# ----- NOTIFICACIÓN OPCIONAL -------------------------------------------------

# -----------------------------------------------------------------------------
# TODO 05: TOAST DE ENTRADA/SALIDA (REFINAMIENTO)
#   Para no perderte en qué modo estás, modifica el bind de entrada del
#   TODO 01 para que también dispare una notificación:
#
#       bind = $mod CTRL ALT, P, exec, hyprctl notify -1 3000 0 "Passthrough ON — $mod+CTRL+ALT+P para salir"
#       bind = $mod CTRL ALT, P, submap, passthrough
#
#   Ambos binds están en la misma combinación. Hyprland los ejecuta en
#   orden: primero notifica, después entra al submap.
#
#   Y dentro del submap (TODO 03), añade también el toast al salir:
#       bind = $mod CTRL ALT, P, exec, hyprctl notify -1 2000 0 "Passthrough OFF"
#       bind = $mod CTRL ALT, P, submap, reset
#
#   Reescribe ambos lugares CON las dos líneas de exec + submap.
# -----------------------------------------------------------------------------



