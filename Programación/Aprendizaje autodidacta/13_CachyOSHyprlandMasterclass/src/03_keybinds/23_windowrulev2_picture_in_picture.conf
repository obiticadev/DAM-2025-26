# ----- SECCIÓN J: STICKY NOTES / WIDGETS -------------------------------------

# -----------------------------------------------------------------------------
# TODO 06: WIDGETS DE ESCRITORIO (eww, ags, conky)
#   Si en el futuro usas widgets, normalmente quieres:
#     - no border
#     - no shadow
#     - no blur
#     - no animation (entran y salen instantáneo)
#     - pin (siempre visibles)
#     - workspace silent (no quitan foco)
#
#   Plantilla genérica para namespace de eww (la cubrirás en Bloque V/VIII):
#
#       windowrulev2 = noblur,     class:^(eww-.*)$
#       windowrulev2 = noshadow,   class:^(eww-.*)$
#       windowrulev2 = noborder,   class:^(eww-.*)$
#       windowrulev2 = norounding, class:^(eww-.*)$
#       windowrulev2 = noanim,     class:^(eww-.*)$
#       windowrulev2 = pin,        class:^(eww-.*)$
#
#   Y para conky:
#       windowrulev2 = noblur,     class:^(Conky)$
#       windowrulev2 = noshadow,   class:^(Conky)$
#       windowrulev2 = nofocus,    class:^(Conky)$       # nunca foco
# -----------------------------------------------------------------------------



