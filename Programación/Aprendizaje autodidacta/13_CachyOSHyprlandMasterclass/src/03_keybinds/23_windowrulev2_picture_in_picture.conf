# =============================================================================
# Ejercicio 23 — Picture-in-Picture & overlays (→ append 70-windowrules.conf)
# -----------------------------------------------------------------------------
# Objetivo: reglas finas para ventanas PIP (Firefox/Brave/Vivaldi), mpv
# en modo "always-on-top", y overlays típicos. Estas ventanas necesitan
# tratamiento especial: pinned (visible en todos los ws), tamaño fijo,
# esquina concreta, sin border/shadow para no llamar atención.
#
# Se anexa al 70-windowrules.conf del ejercicio 22.
#
# Referencia teórica: teoria/03_Keybinds_Window_Mgmt.md  §5.4
# =============================================================================


# ----- SECCIÓN F: FIREFOX/BRAVE/VIVALDI PIP ----------------------------------

# -----------------------------------------------------------------------------
# TODO 01: PIP DE FIREFOX
#   Firefox crea una ventana separada con título exactamente "Picture-in-
#   Picture" cuando activas PIP. Reglas para una experiencia "mini-player":
#
#       windowrulev2 = float,       title:^(Picture-in-Picture)$
#       windowrulev2 = pin,         title:^(Picture-in-Picture)$
#       windowrulev2 = size 640 360, title:^(Picture-in-Picture)$
#       windowrulev2 = move 100%-660 100%-380, title:^(Picture-in-Picture)$
#       windowrulev2 = noborder,    title:^(Picture-in-Picture)$
#       windowrulev2 = noshadow,    title:^(Picture-in-Picture)$
#       windowrulev2 = norounding,  title:^(Picture-in-Picture)$
#       windowrulev2 = keepaspectratio, title:^(Picture-in-Picture)$
#
#   Desglose de `move 100%-660 100%-380`:
#     100% = ancho/alto del monitor
#     -660 = 20px de margen derecho + 640 de ancho de la ventana
#     -380 = 20px de margen inferior + 360 de alto de la ventana
#   Resultado: esquina inferior derecha con margen 20px.
#
#   `keepaspectratio` evita que al redimensionar accidentalmente
#   estropees el aspecto 16:9.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 02: PIP DE BRAVE / CHROME
#   Brave usa class `^(Brave-browser)$` y un title que puede variar; lo
#   más robusto es matchear por title (igual que Firefox) o por
#   `class:^(Picture-in-Picture)$` que algunas builds usan.
#
#       windowrulev2 = float,       title:^(.*Picture-in-Picture.*)$
#       windowrulev2 = float,       class:^(Picture-in-Picture)$
#       windowrulev2 = pin,         title:^(.*Picture-in-Picture.*)$
#       windowrulev2 = pin,         class:^(Picture-in-Picture)$
#       windowrulev2 = size 640 360, class:^(Picture-in-Picture)$
#       windowrulev2 = move 100%-660 100%-380, class:^(Picture-in-Picture)$
#       windowrulev2 = noborder,    class:^(Picture-in-Picture)$
#       windowrulev2 = noshadow,    class:^(Picture-in-Picture)$
#
#   Si no usas Brave/Chrome, deja todas estas líneas igualmente — son
#   inertes hasta que aparezca una ventana que matchee. Cero coste.
# -----------------------------------------------------------------------------



