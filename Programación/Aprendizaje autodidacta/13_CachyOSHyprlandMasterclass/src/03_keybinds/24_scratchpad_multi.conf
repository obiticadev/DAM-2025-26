# Ejercicio 24 — Scratchpads múltiples (→ append 80-workspaces.conf + 90-binds.conf)
# -----------------------------------------------------------------------------
# Objetivo: ampliar tu único scratchpad "magic" a CUATRO scratchpads
# dedicados — terminal flotante, notas (nvim ~/notes.md), música,
# archivos. Cada uno con su atajo, su contenido auto-launched y su
# tamaño/posición.
#
# Este archivo tiene DOS secciones:
#   - PARTE A: declaraciones `workspace = special:NAME` → anexar a
#     `80-workspaces.conf`.
#   - PARTE B: binds `togglespecialworkspace` y windowrules para los
#     scratchpads → anexar a `90-binds.conf` y `70-windowrules.conf`.
#
# Referencia teórica: teoria/03_Keybinds_Window_Mgmt.md  §7
# =============================================================================


