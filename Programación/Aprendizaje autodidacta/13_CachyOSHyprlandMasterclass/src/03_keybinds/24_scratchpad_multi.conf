# TODO 03: SCRATCHPAD "music" — Spotify (alternativa al ws 7)
#   El ws 7 es para Spotify "siempre visible". Este scratchpad es para
#   un mini-control con ncspotify o spotify-tui — útil cuando quieres
#   ver "qué canción suena" sin saltar al ws 7:
#
#       workspace = special:music, on-created-empty:[silent] kitty -e spt
#
#   `spt` = spotify-tui. Si no lo tienes:
#       paru -S spotify-tui
#       # o usa ncspot:  workspace = special:music, on-created-empty:[silent] kitty -e ncspot
#
#   Si NO usas TUI players, cambia a:
#       workspace = special:music, on-created-empty:[silent] spotify
#   (Esto duplica Spotify con tu ws 7 — descomenta una variante o
#   borra el ws 7 declarando aquí solo.)
# -----------------------------------------------------------------------------



