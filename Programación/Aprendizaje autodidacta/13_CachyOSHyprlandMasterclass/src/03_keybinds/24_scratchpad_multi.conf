# ============================================================================
# PARTE C — WINDOWRULES para que aparezcan bonitos
# (anexar a ~/.config/hypr/conf.d/70-windowrules.conf)
# ============================================================================

# -----------------------------------------------------------------------------
# TODO 07: REGLAS DE TAMAÑO PARA LOS SCRATCHPADS
#   El scratchpad usa `dwindle:special_scale_factor` global (0.8). Si
#   quieres diferentes tamaños por scratchpad, sobreescribe con
#   windowrule. Pero la forma más práctica es usar el monitor matcher
#   del propio workspace special.
#
#   Hyprland NO permite por ahora "workspace:special:terminal" en
#   windowrulev2 — el matcher de workspace es por número/nombre normal.
#   Workaround: matcheas por class de la app que vive en cada scratchpad.
#
#       windowrulev2 = float, class:^(kitty)$, title:^(.*scratch.*)$
#
#   Mejor solución: usa el flag `on-created-empty` con clase única.
#   Para kitty: `kitty --class scratch-term`. Modifica el TODO 01:
#       workspace = special:terminal, on-created-empty:[silent] kitty --class scratch-term
#       workspace = special:notes,    on-created-empty:[silent] kitty --class scratch-notes -e nvim ~/notes.md
#       workspace = special:music,    on-created-empty:[silent] kitty --class scratch-music -e spt
#
#   Ahora puedes:
#       windowrulev2 = size 80% 70%,  class:^(scratch-term)$
#       windowrulev2 = size 70% 80%,  class:^(scratch-notes)$
#       windowrulev2 = size 50% 60%,  class:^(scratch-music)$
#       windowrulev2 = center,        class:^(scratch-.*)$
#
#   Estas líneas van en 70-windowrules.conf.
# -----------------------------------------------------------------------------



