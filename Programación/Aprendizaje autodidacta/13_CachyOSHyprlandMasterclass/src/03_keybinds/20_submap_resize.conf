# =============================================================================
# Ejercicio 20 — Submap "resize" (→ conf.d/95-submaps.conf)
# -----------------------------------------------------------------------------
# Objetivo: crear un modo modal para redimensionar ventanas con flechas
# limpias (sin tener que pulsar CTRL ni nada combinado), tipo vim
# "F-mode". Entras con SUPER+R, redimensionas, sales con Escape.
#
# Este archivo se convierte en `~/.config/hypr/conf.d/95-submaps.conf` y
# añades la línea `source = ~/.config/hypr/conf.d/95-submaps.conf` en
# tu `hyprland.conf` entry-point (entre 90-binds y 99-autostart).
#
# Referencia teórica: teoria/03_Keybinds_Window_Mgmt.md  §4
# =============================================================================


# ----- ENTRADA AL SUBMAP -----------------------------------------------------

# -----------------------------------------------------------------------------
# TODO 01: BIND DE ENTRADA — desde el modo normal a "resize"
#   $mod+R entra al submap. Este bind vive FUERA del bloque `submap =
#   resize` (es decir, en el modo normal). Va arriba del archivo:
#
#       bind = $mod, R, submap, resize
#
#   Por qué $mod+R: la R es por "Resize". Si tu memoria muscular ya tiene
#   esta combinación para otra cosa, cámbiala. En CachyOS Hyprland edition
#   no la usa nada por defecto.
# -----------------------------------------------------------------------------



# ----- DECLARACIÓN DEL SUBMAP ------------------------------------------------

# -----------------------------------------------------------------------------
# TODO 02: ABRE EL SUBMAP "resize"
#   A partir de esta línea, los binds aplican SOLO dentro del modo.
#
#       submap = resize
#
#   Hyprland mostrará el nombre del submap en `hyprctl getoption
#   general:layout` (no, en realidad: en eventos socket2 vendrá
#   `submap>>resize`). Si tienes waybar más adelante con módulo
#   `hyprland/submap`, lo verás en la barra.
# -----------------------------------------------------------------------------



# ----- BINDS DEL SUBMAP ------------------------------------------------------

# -----------------------------------------------------------------------------
# TODO 03: FLECHAS PARA RESIZE (binde — se repite si mantienes)
#       binde = , left,  resizeactive, -20  0
#       binde = , right, resizeactive,  20  0
#       binde = , up,    resizeactive,   0 -20
#       binde = , down,  resizeactive,   0  20
#
#   Fíjate: el MODS está VACÍO (coma inicial) porque dentro del submap
#   no necesitas modificadores. Las flechas SOLAS funcionan.
#
#   Este es el lujo del submap: sin modificadores, sin gimnasia de
#   dedos. Solo flechas.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 04: HJKL ALTERNATIVO (vim-style) — DENTRO DEL SUBMAP
#       binde = , h, resizeactive, -20  0
#       binde = , l, resizeactive,  20  0
#       binde = , k, resizeactive,   0 -20
#       binde = , j, resizeactive,   0  20
#
#   Aquí HJKL sí tiene sentido (estamos en un modo dedicado, no hay
#   colisiones con otros binds). En el modo normal evitamos HJKL por
#   colisión con J=togglesplit, L=lock.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 05: STEPS GRANDES — SHIFT+flechas dentro del submap
#   Para resize "salvaje" sin tener que aguantar la tecla:
#
#       binde = SHIFT, left,  resizeactive, -100  0
#       binde = SHIFT, right, resizeactive,  100  0
#       binde = SHIFT, up,    resizeactive,   0 -100
#       binde = SHIFT, down,  resizeactive,   0  100
#
#   Combinando: dentro de "resize", flechas = 20px, SHIFT+flechas =
#   100px, mantener = continuo.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 06: TAMAÑOS PRESET — números
#   Asigna tres presets al pulsar 1, 2, 3 dentro del submap:
#       bind = , 1, resizeactive, exact 25% 100%         # cuarto izquierdo
#       bind = , 2, resizeactive, exact 50% 100%         # mitad
#       bind = , 3, resizeactive, exact 75% 100%         # tres cuartos
#
#   `exact` es modificador del dispatcher: tamaño EXACTO en vez de
#   delta. Funciona en floating; en tile se interpreta como aspecto.
# -----------------------------------------------------------------------------



# -----------------------------------------------------------------------------
# TODO 07: SALIDA DEL SUBMAP — Escape, Return, Q
#   Mínimo tres formas de salir. Si solo dejas una y la olvidas, te
#   atascas en el submap:
#
#       bind = , Escape, submap, reset
#       bind = , Return, submap, reset
#       bind = , q,      submap, reset
#       # Y como "fallback eterno", también $mod+R sale (toggle):
#       bind = $mod, R,  submap, reset
# -----------------------------------------------------------------------------



