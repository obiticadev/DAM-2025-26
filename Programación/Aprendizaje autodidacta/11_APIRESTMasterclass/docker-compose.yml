services:
  postgres:
    image: postgres:16-alpine
    container_name: masterclass-postgres
    environment:
      POSTGRES_DB: masterclass
      POSTGRES_USER: master
      POSTGRES_PASSWORD: master
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U master -d masterclass"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongo:
    image: mongo:7
    container_name: masterclass-mongo
    ports:
      - "27017:27017"

volumes:
  pgdata:
